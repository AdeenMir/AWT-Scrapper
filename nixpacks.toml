[phases.setup]
nixPkgs = ["nodejs_20"]
aptPkgs = [
  "chromium",
  "fonts-liberation",
  "libnss3",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libcups2",
  "libdrm2",
  "libgbm1",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "xdg-utils",
]

[phases.install]
cmds = [
  "cd server && npm install",
  "cd client && npm install --legacy-peer-deps",
]

[phases.build]
cmds = [
  "cd client && npm run build",
  "rm -rf server/public && mkdir -p server/public && cp -r client/dist/. server/public/",
]

[start]
cmd = "cd server && npm start"

[variables]
PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium"
